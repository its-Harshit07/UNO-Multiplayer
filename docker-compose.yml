version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    volumes:
      - ./backend/prisma:/app/backend/prisma
    environment:
      - PORT=3000
      - DATABASE_URL=file:./uno.db
    expose:
      - 3000
    restart: always

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    expose:
      - 80
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: always
